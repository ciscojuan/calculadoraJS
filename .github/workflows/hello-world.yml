name: hello world

on: [push, pull_request]

jobs:
  hola:
    runs-on: ubuntu-latest
    steps:
      - name: create hello file
        run: echo hola-mundo.txt
      - name: print hello world on file
        run: echo "hola mundo" > hola-mundo.txt
      - name: read hola-mundo file
        run: more hola-mundo.txt
  atual-directory:
    needs: hola
    runs-on: ubuntu-latest
    steps:
      - name: print current directory
        run: pwd
  local_runs:
    runs-on: ubuntu-latest
    steps:
      - name: check out code
        uses: actions/checkout@v3
      - name: print current directory
        uses: ./.github/actions/my-action
